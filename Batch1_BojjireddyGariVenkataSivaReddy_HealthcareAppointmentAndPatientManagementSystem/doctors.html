<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="toast-container"></div>

<nav class="navbar navbar-dark bg-success">
    <div class="container-fluid">
        <span class="navbar-brand">Doctor Management</span>
        <a href="index.html" class="btn btn-light">Home</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card p-3 shadow-sm">

        <div class="d-flex justify-content-between">
            <h5>Doctors List</h5>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#doctorModal">
                Add Doctor
            </button>
        </div>

        <table class="table mt-3">
            <thead class="table-light">
                <tr>
                    <th>Name</th>
                    <th>Specialization</th>
                    <th>Slot</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="doctorTable"></tbody>
        </table>

    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="doctorModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <form id="doctorForm">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Doctor Form</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="doctorId">

                    <input class="form-control mb-2" id="docName" placeholder="Doctor Name">

                    <select class="form-control mb-2" id="specialization"></select>

                    <input class="form-control mb-2" id="slot" placeholder="Available Time Slot">

                </div>

                <div class="modal-footer">
                    <button class="btn btn-success">Save</button>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
<script src="js/doctors.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
