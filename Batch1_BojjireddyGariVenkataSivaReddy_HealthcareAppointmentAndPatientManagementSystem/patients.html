<!DOCTYPE html>
<html>
<head>
    <title>Patients</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="toast-container"></div>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Patient Management</span>
        <a href="index.html" class="btn btn-light">Home</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card p-3 shadow-sm">

        <div class="d-flex justify-content-between">
            <h5>Patients List</h5>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#patientModal">
                Add Patient
            </button>
        </div>

        <input type="text" id="searchPatient" class="form-control mt-3" placeholder="Search by name or phone">

        <table class="table mt-3">
            <thead class="table-light">
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="patientTable"></tbody>
        </table>

    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="patientModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <form id="patientForm">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Patient Form</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="patientId">

                    <input class="form-control mb-2" id="name" placeholder="Name">
                    <input class="form-control mb-2" id="age" type="number" placeholder="Age">

                    <select class="form-control mb-2" id="gender">
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>

                    <input class="form-control mb-2" id="phone" placeholder="Phone">
                    <input class="form-control mb-2" id="email" placeholder="Email">

                    <textarea class="form-control" id="notes" placeholder="Medical Notes"></textarea>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-success">Save</button>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
<script src="js/patients.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
